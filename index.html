<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerMonitor Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Usando CDN alternativo para o Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Monitor de Energia</h1>
                <p id="last-sync" style="color: #ffcc00; font-weight: bold;">Verificando conexão com a internet...</p>
            </div>
            <div id="connection-status" class="indicator offline pulse"></div>
        </header>

        <main>
            <div class="status-grid" id="main-grid">
                <div class="card">
                    <div class="card-title">Energia Principal</div>
                    <div class="card-value" id="power-status">---</div>
                    <p id="power-detail">Aguardando...</p>
                </div>
                <div class="card">
                    <div class="card-title">Gerador</div>
                    <div class="card-value" id="gen-status">---</div>
                    <p id="gen-detail">Aguardando...</p>
                </div>
                <div class="card">
                    <div class="card-title">Combustível</div>
                    <div class="card-value" id="fuel-val">---</div>
                    <p>Status Remoto</p>
                </div>
            </div>

            <section class="history-section">
                <h2 style="margin-bottom: 1.5rem;">Histórico</h2>
                <div class="history-list" id="history-container">
                    <div class="history-item" id="debug-msg">JavaScript está carregando...</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SB_URL = "https://wzbgryhhwpaejjkcnssh.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YmdyeWhod3BhZWpqa2Nuc3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTY0MzcsImV4cCI6MjA5NDE3MjQzN30.KyC7aqIGQNjVLZ-cNwrJlappj-btxikJZaziqzFdCbM";
        
        console.log("Script carregado!");
        document.getElementById('debug-msg').innerText = "JavaScript iniciado. Tentando conectar ao Supabase...";

        async function start() {
            try {
                if (typeof supabase === 'undefined') {
                    document.getElementById('debug-msg').innerText = "ERRO: Biblioteca Supabase não foi carregada pelo navegador.";
                    return;
                }

                const client = supabase.createClient(SB_URL, SB_KEY);
                document.getElementById('debug-msg').innerText = "Conectado ao Supabase. Buscando dados...";

                // Busca dados
                const { data: status, error } = await client.from('current_status').select('*').eq('id', 1).single();
                
                if (error) {
                    document.getElementById('debug-msg').innerText = "ERRO BANCO: " + error.message;
                    return;
                }

                if (status) {
                    document.getElementById('power-status').innerText = status.is_power_online ? "ONLINE" : "OFFLINE";
                    document.getElementById('gen-status').innerText = status.is_generator_running ? "LIGADO" : "DESLIGADO";
                    document.getElementById('fuel-val').innerText = status.fuel_level || "OK";
                    document.getElementById('connection-status').className = 'indicator online';
                    document.getElementById('last-sync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
                    document.getElementById('last-sync').style.color = "#00ff00";
                    document.getElementById('debug-msg').innerText = "Sistema Operacional.";
                }

                // Logs
                const { data: logs } = await client.from('status_logs').select('*').order('created_at', { ascending: false }).limit(10);
                if (logs && logs.length > 0) {
                    const container = document.getElementById('history-container');
                    container.innerHTML = '';
                    logs.forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'history-item';
                        div.innerText = `${new Date(log.created_at).toLocaleTimeString()} - ${log.event_type}`;
                        container.appendChild(div);
                    });
                }

            } catch (e) {
                document.getElementById('debug-msg').innerText = "ERRO CRÍTICO: " + e.message;
            }
        }

        // Tentar iniciar
        start();
    </script>
</body>
</html>
