<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerMonitor Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Monitor de Energia</h1>
                <p id="last-sync" style="color: var(--text-secondary); margin-top: 0.5rem;">Aguardando conexão...</p>
                
                <div id="setup-area" style="margin-top: 15px;">
                    <input type="text" id="sb-url" placeholder="Supabase URL" style="padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--card-bg); width: 250px; font-size: 0.8rem;">
                    <input type="password" id="sb-key" placeholder="Supabase Anon Key" style="padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--card-bg); width: 200px; font-size: 0.8rem;">
                    <button onclick="saveConfig()" style="padding: 8px 15px; border-radius: 8px; border: none; background: var(--accent-blue); color: white; cursor: pointer; font-weight: 600;">Conectar</button>
                </div>
            </div>
            <div id="connection-status" class="indicator"></div>
        </header>

        <main>
            <div class="status-grid">
                <div class="card">
                    <div class="card-title">Energia Principal</div>
                    <div class="card-value" id="power-status">---</div>
                    <p id="power-detail" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">Status desconhecido</p>
                </div>

                <div class="card">
                    <div class="card-title">Gerador</div>
                    <div class="card-value" id="gen-status">---</div>
                    <p id="gen-detail" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">Sem monitoramento</p>
                </div>

                <div class="card">
                    <div class="card-title">Nível de Combustível</div>
                    <div class="card-value" id="fuel-status">
                        <i data-lucide="fuel" style="color: var(--accent-blue)"></i>
                        <span id="fuel-val">---</span>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">Visualização Remota</p>
                </div>
            </div>

            <section class="history-section">
                <h2 style="margin-bottom: 1.5rem; font-weight: 600;">Histórico em Tempo Real</h2>
                <div class="history-list" id="history-container">
                    <div class="history-item">Configure o Supabase para começar.</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let supabase = null;

        function saveConfig() {
            const url = document.getElementById('sb-url').value;
            const key = document.getElementById('sb-key').value;
            localStorage.setItem('sb_url', url);
            localStorage.setItem('sb_key', key);
            initSupabase();
        }

        async function initSupabase() {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (!url || !key) return;

            document.getElementById('sb-url').value = url;
            document.getElementById('sb-key').value = key;
            
            supabase = supabase.createClient(url, key);
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('connection-status').className = 'indicator online';

            loadData();
            subscribe();
        }

        async function loadData() {
            // Load Current Status
            const { data: status } = await supabase.from('current_status').select('*').eq('id', 1).single();
            if (status) updateStatusUI(status);

            // Load History
            const { data: logs } = await supabase.from('status_logs').select('*').order('created_at', { ascending: false }).limit(20);
            if (logs) updateHistoryUI(logs);
        }

        function subscribe() {
            supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'current_status' }, (payload) => {
                updateStatusUI(payload.new);
            })
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'status_logs' }, (payload) => {
                loadData(); // Reload for safety
            })
            .subscribe();
        }

        function updateStatusUI(status) {
            const pStatus = document.getElementById('power-status');
            pStatus.innerHTML = status.is_power_online ? '<span class="indicator online"></span> <span>Online</span>' : '<span class="indicator offline pulse"></span> <span>OFFLINE</span>';
            document.getElementById('power-detail').innerText = status.is_power_online ? 'Rede Elétrica OK' : 'Falha Detectada';

            const gStatus = document.getElementById('gen-status');
            gStatus.innerHTML = status.is_generator_running ? '<span class="indicator running pulse"></span> <span>LIGADO</span>' : '<span class="indicator"></span> <span>Desligado</span>';
            document.getElementById('gen-detail').innerText = status.is_generator_running ? 'Motor em operação' : 'Em stand-by';

            document.getElementById('fuel-val').innerText = status.fuel_level || 'Monitorando';
            document.getElementById('last-sync').innerText = 'Sincronizado: ' + new Date().toLocaleTimeString();
        }

        function updateHistoryUI(logs) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let icon = 'info';
                let color = '#888';
                if (log.event_type.includes('power')) { icon = 'zap'; color = log.event_type.includes('restore') ? 'var(--accent-green)' : 'var(--accent-red)'; }
                else if (log.event_type.includes('generator')) { icon = 'engine'; color = 'var(--accent-orange)'; }
                else if (log.event_type === 'fuel_check') { icon = 'camera'; color = 'var(--accent-blue)'; }

                item.innerHTML = `
                    <div class="event-type">
                        <i data-lucide="${icon}" style="color: ${color}; width: 18px;"></i>
                        <span>${log.event_type.replace('_', ' ')}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="event-time">${new Date(log.created_at).toLocaleString()}</span>
                        ${log.image_url ? `<a href="${log.image_url}" target="_blank" class="event-media">Ver Foto</a>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
            lucide.createIcons();
        }

        initSupabase();
    </script>
</body>
</html>
