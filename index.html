<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EACEA-HSA | Monitor de Energia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0071e3">
    <link rel="icon" type="image/png" href="dtcea_sj_logo.png">
    <link rel="stylesheet" href="style-fab.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        .fuel-image-container {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fuel-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-brand">
                <div class="fab-badge">
                    <img src="dtcea_sj_logo.png" alt="Brasão DTCEA-SJ">
                </div>
                <div>
                    <h1>Monitor de Energia</h1>
                    <p class="subtitle">EACEA-HSA · Força Aérea Brasileira</p>
                </div>
            </div>
            <div style="text-align: right;">
                <div style="display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 0.3rem;">
                    <span id="terminal-label" style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600;">Terminal</span>
                    <div id="connection-status" class="indicator offline pulse"></div>
                </div>
                <p id="last-sync" style="color: var(--text-secondary); font-size: 0.78rem;">Sincronizando...</p>
            </div>
        </header>

        <main>
            <div class="status-grid">
                <div class="card">
                    <div class="card-title">Energia Principal</div>
                    <div class="card-value" id="power-status">---</div>
                    <p id="power-detail" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">
                        Verificando rede...</p>
                </div>

                <div class="card">
                    <div class="card-title">Gerador</div>
                    <div class="card-value" id="gen-status">---</div>
                    <p id="gen-detail" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">
                        Monitor de ruído</p>
                </div>

                <div class="card">
                    <div class="card-title">Combustível / Painel</div>
                    <div id="latest-fuel-image" class="fuel-image-container">
                        <i data-lucide="camera" style="color: var(--accent-blue); opacity: 0.5;"></i>
                    </div>
                    <p id="fuel-detail" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.8rem;">
                        Aguardando foto...</p>
                </div>
            </div>

            <section class="history-section">
                <h2>Histórico em Tempo Real</h2>
                <div class="history-list" id="history-container">
                    <div class="history-item">Carregando eventos...</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SB_URL = "https://wzbgryhhwpaejjkcnssh.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YmdyeWhod3BhZWpqa2Nuc3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTY0MzcsImV4cCI6MjA5NDE3MjQzN30.KyC7aqIGQNjVLZ-cNwrJlappj-btxikJZaziqzFdCbM";

        let client = null;

        async function init() {
            // Registro do Service Worker para PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .catch(err => console.log('Erro Service Worker:', err));
            }
            try {
                if (typeof supabase === 'undefined') return;
                client = supabase.createClient(SB_URL, SB_KEY);

                await loadData();

                // Realtime
                client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'current_status' }, payload => {
                    updateStatusUI(payload.new);
                }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'status_logs' }, () => {
                    loadData();
                }).subscribe();

                // Check connection status locally every 5 seconds (much snappier)
                setInterval(checkConnection, 5000);

            } catch (e) {
                document.getElementById('last-sync').innerText = "Erro: " + e.message;
            }
        }

        async function loadData() {
            const { data: status } = await client.from('current_status').select('*').eq('id', 1).single();
            if (status) updateStatusUI(status);

            const { data: logs } = await client.from('status_logs').select('*').order('created_at', { ascending: false }).limit(15);
            if (logs) {
                updateHistoryUI(logs);
            }

            // Busca dedicada pela foto mais recente (suporta nomes antigos e novos)
            const { data: photoLog } = await client
                .from('status_logs')
                .select('*')
                .not('image_url', 'is', null)
                .order('created_at', { ascending: false })
                .limit(1)
                .single();
            if (photoLog) updateFuelCard(photoLog);

            document.getElementById('last-sync').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
        }

        let lastKnownStatus = null;

        function updateStatusUI(status) {
            lastKnownStatus = status;
            const pStatus = document.getElementById('power-status');
            pStatus.innerHTML = status.is_power_online ? '<span class="indicator online"></span> <span>ONLINE</span>' : '<span class="indicator offline pulse"></span> <span>FALTA ENERGIA</span>';
            document.getElementById('power-detail').innerText = status.is_power_online ? 'Rede Elétrica OK' : 'Operando via Bateria';

            const gStatus = document.getElementById('gen-status');
            gStatus.innerHTML = status.is_generator_running ? '<span class="indicator running pulse"></span> <span>LIGADO</span>' : '<span class="indicator"></span> <span>Desligado</span>';
            document.getElementById('gen-detail').innerText = status.is_generator_running ? 'Motor em operação' : 'Em stand-by';

            checkConnection();
            lucide.createIcons();
        }

        function checkConnection() {
            if (!lastKnownStatus) return;
            const connStatus = document.getElementById('connection-status');
            const label = document.getElementById('terminal-label');
            const lastUpdate = new Date(lastKnownStatus.last_update);
            const now = new Date();
            const diffSeconds = (now - lastUpdate) / 1000;

            if (diffSeconds < 50) { // Verde se atualizado nos últimos 50 segundos
                connStatus.className = 'indicator online';
                label.style.color = 'var(--accent-green)';
                label.innerText = 'Terminal Ativo';
            } else { // Vermelho se estiver sem sinal
                connStatus.className = 'indicator offline pulse';
                label.style.color = 'var(--accent-red)';
                label.innerText = 'Terminal Offline';
            }
        }

        function updateFuelCard(log) {
            const container = document.getElementById('latest-fuel-image');
            container.innerHTML = `<img src="${log.image_url}" onclick="window.open('${log.image_url}', '_blank')">`;
            document.getElementById('fuel-detail').innerText = "Atualizado: " + new Date(log.created_at).toLocaleTimeString();
        }

        function updateHistoryUI(logs) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'history-item';

                let icon = 'info';
                let color = '#888';
                let label = log.event_type.replace('_', ' ');

                // Mapeamento de legibilidade e suporte a registros antigos (Legacy support)
                const translations = {
                    'power_outage': 'Queda de Energia',
                    'power_restore': 'Energia Normalizada',
                    'generator_start': 'Gerador Ligado',
                    'generator_stop': 'Gerador Desligado',
                    'fuel_check': 'Monitoramento Visual',
                    'queda_energia': 'Queda de Energia',
                    'energia_normalizada': 'Energia Normalizada',
                    'gerador_ligado': 'Gerador Ligado',
                    'gerador_desligado': 'Gerador Desligado',
                    'leitura_painel': 'Monitoramento Visual'
                };

                if (translations[log.event_type]) {
                    label = translations[log.event_type];
                }

                if (log.event_type.includes('energia') || log.event_type.includes('queda') || log.event_type.includes('power')) {
                    icon = 'zap';
                    color = (log.event_type.includes('normalizada') || log.event_type.includes('restore')) ? '#34c759' : '#ff3b30';
                }
                else if (log.event_type.includes('gerador') || log.event_type.includes('generator')) {
                    icon = 'engine';
                    color = '#ff9500';
                }
                else if (log.event_type === 'leitura_painel' || log.event_type === 'fuel_check') {
                    icon = 'camera';
                    color = '#0071e3';
                }

                item.innerHTML = `
                    <div class="event-type">
                        <i data-lucide="${icon}" style="color: ${color}; width: 18px;"></i>
                        <span style="text-transform: capitalize">${label}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="event-time">${new Date(log.created_at).toLocaleTimeString()}</span>
                        ${log.image_url ? `<a href="${log.image_url}" target="_blank" class="event-media">Ver Foto</a>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>

</html>
