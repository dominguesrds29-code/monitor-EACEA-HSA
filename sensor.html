<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerMonitor Pro | Sensor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 1rem; }
        .setup-box { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 2rem; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        #debug-log { text-align: left; background: #111; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; padding: 10px; color: #0f0; border-radius: 10px; margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>Sensor Remoto Pro</h1>
    <p>Conecte ao seu Supabase para iniciar</p>

    <div id="setup-view" class="setup-box">
        <input type="text" id="sb-url" placeholder="Supabase URL">
        <input type="password" id="sb-key" placeholder="Supabase Anon Key">
        <button id="start-btn" style="width: 100%; padding: 15px; background: #0071e3; color: white; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px;">INICIAR MONITORAMENTO</button>
    </div>

    <div id="active-view" style="display: none;">
        <div id="status-box" class="status online">Ativo</div>
        <div id="debug-log">Log do Sistema:<br></div>
    </div>

    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        let supabase = null;
        const debugLog = document.getElementById('debug-log');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugLog.innerHTML += `[${time}] ${msg}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        // Restore keys
        document.getElementById('sb-url').value = localStorage.getItem('sb_url') || '';
        document.getElementById('sb-key').value = localStorage.getItem('sb_key') || '';

        document.getElementById('start-btn').onclick = async () => {
            const url = document.getElementById('sb-url').value;
            const key = document.getElementById('sb-key').value;
            
            if (!url || !key) return alert("Preencha os dados do Supabase!");
            
            localStorage.setItem('sb_url', url);
            localStorage.setItem('sb_key', key);
            
            supabase = supabase.createClient(url, key);
            
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('active-view').style.display = 'block';
            
            log("Iniciando sensores...");
            initBattery();
            initCamera();
            initAudio();
            setInterval(takePhoto, 60000);
        };

        async function initBattery() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                const update = async () => {
                    const online = battery.charging;
                    log("⚡ Energia: " + (online ? "Conectado" : "QUEDA!"));
                    
                    // Update Database
                    await supabase.from('current_status').update({ is_power_online: online }).eq('id', 1);
                    await supabase.from('status_logs').insert({ event_type: online ? 'power_restore' : 'power_outage' });
                };
                battery.addEventListener('chargingchange', update);
                update();
            } else { log("❌ Bateria não suportada"); }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                log("✅ Câmera pronta");
            } catch (e) { log("❌ Erro Câmera: " + e.name); }
        }

        async function takePhoto() {
            if (!video.videoWidth) return;
            log("📸 Tirando foto...");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fileName = `fuel_${Date.now()}.jpg`;
                const { data, error } = await supabase.storage.from('assets').upload(fileName, blob);
                
                if (data) {
                    const { data: { publicUrl } } = supabase.storage.from('assets').getPublicUrl(fileName);
                    await supabase.from('status_logs').insert({ event_type: 'fuel_check', image_url: publicUrl });
                    log("✅ Foto enviada");
                } else { log("❌ Erro Upload: " + error.message); }
            }, 'image/jpeg', 0.6);
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                source.connect(analyzer);
                const dataArray = new Uint8Array(analyzer.frequencyBinCount);
                
                let isGenRunning = false;
                const check = async () => {
                    analyzer.getByteFrequencyData(dataArray);
                    let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    
                    if (avg > 50 && !isGenRunning) {
                        isGenRunning = true;
                        log("⚠️ Ruído de Gerador!");
                        await supabase.from('current_status').update({ is_generator_running: true }).eq('id', 1);
                        await supabase.from('status_logs').insert({ event_type: 'generator_start' });
                    } else if (avg < 30 && isGenRunning) {
                        isGenRunning = false;
                        log("🤫 Gerador Parou");
                        await supabase.from('current_status').update({ is_generator_running: false }).eq('id', 1);
                        await supabase.from('status_logs').insert({ event_type: 'generator_stop' });
                    }
                    requestAnimationFrame(check);
                };
                check();
            } catch (e) { log("❌ Erro Áudio"); }
        }
    </script>
</body>
</html>
