<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Sensor | EACEA-HSA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }

        #debug-log {
            text-align: left;
            background: #111;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 10px;
            color: #0f0;
            border-radius: 10px;
            margin-top: 2rem;
            border: 1px solid #333;
        }

        .big-btn {
            width: 100%;
            padding: 20px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.4);
        }
    </style>
</head>

<body>
    <h1 style="margin-top: 2rem;">Terminal Sensor SIME</h1>
    <p style="color: #888; margin-bottom: 2rem;">EACEA-HSA &middot; Mantenha o celular na tomada e a tela ligada.</p>

    <div id="setup-view">
        <button id="start-btn" class="big-btn">LIGAR MONITORAMENTO</button>
    </div>

    <div id="active-view" style="display: none;">
        <div id="status-box" class="status online">Monitoramento Ativo</div>
        <div id="debug-log">Log do Sistema:<br></div>
    </div>

    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const SB_URL = "https://wzbgryhhwpaejjkcnssh.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YmdyeWhod3BhZWpqa2Nuc3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTY0MzcsImV4cCI6MjA5NDE3MjQzN30.KyC7aqIGQNjVLZ-cNwrJlappj-btxikJZaziqzFdCbM";

        let supabaseClient = null;
        const debugLog = document.getElementById('debug-log');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugLog.innerHTML += `[${time}] ${msg}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        window.onload = () => {
            log("Página carregada. Pronto para iniciar.");
        };

        document.getElementById('start-btn').onclick = async () => {
            try {
                if (!window.supabase) {
                    throw new Error("Supabase não carregou. Verifique a internet.");
                }

                log("Conectando ao Supabase...");
                supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('active-view').style.display = 'block';

                log("✅ Conectado. Iniciando sensores...");

                initBattery();
                initCamera();
                initAudio();
                setInterval(takePhoto, 60000);
                
                // Heartbeat mais frequente (20s) para resposta rápida no dashboard
                sendHeartbeat(true); 
                setInterval(() => sendHeartbeat(true), 20000);
            } catch (e) {
                alert("Erro: " + e.message);
                log("❌ ERRO: " + e.message);
            }
        };

        // Evento para tentar avisar que o sensor foi fechado (não é 100% garantido, mas ajuda)
        window.onbeforeunload = () => {
            if (supabaseClient) sendHeartbeat(false);
        };

        async function sendHeartbeat(isActive) {
            if (!supabaseClient) return;
            try {
                // Se isActive for false, enviamos uma data muito antiga para forçar o dashboard a ficar vermelho
                const timestamp = isActive ? new Date().toISOString() : new Date(0).toISOString();
                await supabaseClient.from('current_status').update({ 
                    last_update: timestamp
                }).eq('id', 1);
            } catch (e) { console.error("Heartbeat error", e); }
        }

        async function initBattery() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                const update = async () => {
                    const online = battery.charging;
                    log("⚡ Energia: " + (online ? "Conectado" : "QUEDA!"));

                    try {
                        // Tenta atualizar ou inserir se não existir (UPSERT)
                        const { error } = await supabaseClient.from('current_status').upsert({
                            id: 1,
                            is_power_online: online,
                            last_update: new Date().toISOString()
                        });

                        if (error) throw error;

                        await supabaseClient.from('status_logs').insert({ event_type: online ? 'energia_normalizada' : 'queda_energia' });
                        log("✅ Sincronizado com a nuvem!");
                    } catch (e) { log("❌ Erro de Sincronização: " + e.message); }
                };
                battery.addEventListener('chargingchange', update);
                update();
            } else { log("❌ Sensor de bateria não suportado"); }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                log("✅ Câmera ativada");
            } catch (e) { log("❌ Erro Câmera: " + e.message); }
        }

        async function takePhoto() {
            if (!video.videoWidth) return;
            log("📸 Capturando e comprimindo imagem...");

            // Redimensionar para economizar espaço (máximo 1024px de largura)
            const scale = Math.min(1, 1024 / video.videoWidth);
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Qualidade 0.5 (50%) para reduzir drasticamente o tamanho do arquivo
            canvas.toBlob(async (blob) => {
                try {
                    const fileName = `fuel_${Date.now()}.jpg`;
                    const { data, error } = await supabaseClient.storage.from('assets').upload(fileName, blob, {
                        contentType: 'image/jpeg'
                    });

                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage.from('assets').getPublicUrl(fileName);

                    // Salvar a URL na tabela de logs para o Dashboard encontrar
                    await supabaseClient.from('status_logs').insert({
                        event_type: 'leitura_painel', image_url: publicUrl
                    });

                    log(`✅ Foto enviada (${(blob.size / 1024).toFixed(1)} KB)`);
                } catch (e) { log("❌ Erro na foto: " + e.message); }
            }, 'image/jpeg', 0.5);
        }

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                source.connect(analyzer);
                const dataArray = new Uint8Array(analyzer.frequencyBinCount);

                let isGenRunning = false;
                const check = async () => {
                    analyzer.getByteFrequencyData(dataArray);
                    let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;

                    if (avg > 50 && !isGenRunning) {
                        isGenRunning = true;
                        log("⚠️ BARULHO! Gerador detectado.");
                        await supabaseClient.from('current_status').update({ is_generator_running: true }).eq('id', 1);
                        await supabaseClient.from('status_logs').insert({ event_type: 'gerador_ligado' });
                    } else if (avg < 30 && isGenRunning) {
                        isGenRunning = false;
                        log("🤫 Silêncio. Gerador parou.");
                        await supabaseClient.from('current_status').update({ is_generator_running: false }).eq('id', 1);
                        await supabaseClient.from('status_logs').insert({ event_type: 'gerador_desligado' });
                    }
                    requestAnimationFrame(check);
                };
                check();
                log("✅ Microfone monitorando ruídos");
            } catch (e) { log("❌ Erro Microfone: " + e.message); }
        }
    </script>
</body>

</html>
